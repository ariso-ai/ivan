blockers: []

questions: [Should the committed SQLite merge-strategy research doc also be committed in git, what exact canonical ID generation scheme should the builder use, and do we want Markdown+frontmatter or JSON/JSONL as the long-term canonical record format after the first implementation pass?]

decisions:
  - storage_model: Option C is canonical; repo-committed text records under learnings/ are the source of truth and learnings.db is a derived local/CI read model.
  - raw_input_naming: Use evidence as the top-level raw input term rather than artifact because the core inputs are human PR comments, review summaries, and session-derived notes.
  - repository_scope: Keep repository_id from day one even if the first deployment is repo-local.
  - deferred_persistence: Tombstones, persisted jobs, audit events, persisted query history, and persisted capability proposals are deferred for the MVP.
  - prompt_recall_scope: UserPromptSubmit should search only local derived knowledge, never live GitHub.

findings:
  - conversation_id: Current Codex thread id is 019ccfe9-2c44-7ce0-bcb0-dbfb12006399 and should be treated as background context for follow-on planning.
  - key_research_result: The committed-live-SQLite-as-source-of-truth approach is not the MVP path; the research strongly supports text-first canonical records plus a deterministic SQLite builder.
  - core_product_focus: GitHub PR evidence extraction and weighting for learning quality is a first-order product input and should guide the implementation plan.
  - commit_reference: The PR learning-quality research memo was committed in git as 321da28 with message Add GitHub PR learning quality research.
  - background_docs: The next agent should use the spec and both research memos together, not the spec in isolation.

worked: [Using one-file-per-record canonical text storage, separating canonical data from the derived SQLite read model, keeping runtime orchestration out of persistence, and storing research/spec artifacts directly in thoughts/shared for easy reuse.]
failed: [Treating a committed live SQLite file as canonical storage failed the MVP simplicity test because branch merges, WAL behavior, and binary conflict resolution create avoidable complexity.]

