name: Ivan Address PR Comments

on:
  issue_comment:
    types: [created]

jobs:
  handle-address:
    if: github.event.issue.pull_request != null && contains(github.event.comment.body, '@ivan-agent /address')
    runs-on: [self-hosted, Linux]
    environment: ivan
    permissions:
      issues: write
      contents: write
      pull-requests: write

    steps:
      - name: Check required secrets
        run: |
          if [ -z "${{ secrets.OPEN_AI_KEY }}" ]; then
            echo "Error: OPEN_AI_KEY secret is not set"
            exit 1
          fi
          if [ -z "${{ secrets.ANTHROPIC_KEY }}" ]; then
            echo "Error: ANTHROPIC_KEY secret is not set"
            exit 1
          fi
          if [ -z "${{ secrets.PAT }}" ]; then
            echo "Error: PAT secret is not set"
            exit 1
          fi
          echo "All required secrets are present"

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT }}
          fetch-depth: 0

      - name: Create Ivan config directory
        run: mkdir -p ~/.ivan

      - name: Write Ivan config
        env:
          OPENAI_KEY: ${{ secrets.OPEN_AI_KEY }}
          ANTHROPIC_KEY: ${{ secrets.ANTHROPIC_KEY }}
          GH_PAT: ${{ secrets.PAT }}
        run: |
          jq -n \
            --arg openai "$OPENAI_KEY" \
            --arg anthropic "$ANTHROPIC_KEY" \
            --arg pat "$GH_PAT" \
            '{
              openaiApiKey: $openai,
              anthropicApiKey: $anthropic,
              version: "1.0.0",
              executorType: "sdk",
              githubAuthType: "pat",
              githubPat: $pat,
              repoInstructionsDeclined: {},
              repoInstructions: {},
              reviewAgent: "@coderabbitai"
            }' \
            > ~/.ivan/config.json
          echo "Config file created at ~/.ivan/config.json"

      - name: Install Ivan CLI
        run: |
          npm install -g @ariso-ai/ivan@latest --prefix ~/.local
          echo "Ivan installed successfully"
          ~/.local/bin/ivan --version

      - name: Add eyes reaction to comment
        uses: peter-evans/create-or-update-comment@v4
        with:
          comment-id: ${{ github.event.comment.id }}
          reactions: eyes

      - name: Run Ivan address command
        id: run_ivan_address
        run: |
          PR_NUMBER=${{ github.event.issue.number }}
          echo "Running ivan address for PR #$PR_NUMBER"
          set +e
          ~/.local/bin/ivan address $PR_NUMBER --non-interactive 2>&1 | tee /tmp/ivan_address_output.txt
          EXIT_CODE=${PIPESTATUS[0]}
          set -e

          if [ $EXIT_CODE -ne 0 ]; then
            echo "ivan_failed=true" >> $GITHUB_OUTPUT
          else
            echo "ivan_failed=false" >> $GITHUB_OUTPUT
          fi
          echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT

      - name: Comment with address output
        if: steps.run_ivan_address.outputs.ivan_failed == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const addressOutput = fs.readFileSync('/tmp/ivan_address_output.txt', 'utf8');
            const prNumber = '${{ steps.run_ivan_address.outputs.pr_number }}';

            const body = '✅ **Ivan has finished addressing comments on PR #' + prNumber + '**\n\n' +
              'The PR has been updated based on the review comments.\n\n' +
              '<details>\n' +
              '<summary>View ivan address command output</summary>\n\n' +
              '```\n' + addressOutput + '\n```\n\n' +
              '</details>';

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });

      - name: Comment if Ivan address failed
        if: steps.run_ivan_address.outputs.ivan_failed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '❌ `ivan address` command failed. Please check the workflow logs for details.'
            });
